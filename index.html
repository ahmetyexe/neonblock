<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Neon Tetris PWA</title>
  <meta name="description" content="Premium Neon-Pastel Tetris Experience" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0b10" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- SVG Sprite -->
  <svg style="display: none;">
    <symbol id="icon-left" viewBox="0 0 24 24">
      <path d="m15 18-6-6 6-6" />
    </symbol>
    <symbol id="icon-right" viewBox="0 0 24 24">
      <path d="m9 18 6-6-6-6" />
    </symbol>
    <symbol id="icon-down" viewBox="0 0 24 24">
      <path d="m6 9 6 6 6-6" />
    </symbol>
    <symbol id="icon-rotate" viewBox="0 0 24 24">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
      <path d="M21 3v5h-5" />
    </symbol>
    <symbol id="icon-hard-drop" viewBox="0 0 24 24">
      <path d="M12 2v14" />
      <path d="m19 9-7 7-7-7" />
      <path d="M5 22h14" />
    </symbol>
    <symbol id="icon-pause" viewBox="0 0 24 24">
      <rect width="4" height="16" x="6" y="4" rx="1" />
      <rect width="4" height="16" x="14" y="4" rx="1" />
    </symbol>
    <symbol id="icon-play" viewBox="0 0 24 24">
      <path d="m7 3 14 9-14 9V3z" />
    </symbol>
    <symbol id="icon-sound-on" viewBox="0 0 24 24">
      <path d="M11 5 6 9H2v6h4l5 4V5z" />
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
    </symbol>
    <symbol id="icon-sound-off" viewBox="0 0 24 24">
      <path d="M11 5 6 9H2v6h4l5 4V5z" />
      <line x1="23" y1="9" x2="17" y2="15" />
      <line x1="17" y1="9" x2="23" y2="15" />
    </symbol>
    <symbol id="icon-music-on" viewBox="0 0 24 24">
      <path d="M9 18V5l12-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="18" cy="16" r="3" />
    </symbol>
    <symbol id="icon-music-off" viewBox="0 0 24 24">
      <path d="M9 18V5l12-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="18" cy="16" r="3" />
      <line x1="2" y1="2" x2="22" y2="22" stroke-width="2" />
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" />
      <path
        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
    </symbol>
    <symbol id="icon-back" viewBox="0 0 24 24">
      <path d="m15 18-6-6 6-6" />
    </symbol>
    <symbol id="icon-timer" viewBox="0 0 24 24">
      <circle cx="12" cy="13" r="8" />
      <path d="M12 9v4l2 2" />
      <path d="M9 1h6" />
      <path d="M12 1v3" />
    </symbol>
    <symbol id="icon-bolt" viewBox="0 0 24 24">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
    </symbol>
  </svg>

  <!-- ==================== MAIN MENU ==================== -->
  <div id="main-menu" class="menu-screen">
    <button id="settings-btn" class="settings-icon-btn" title="Ayarlar">
      <svg>
        <use href="#icon-settings"></use>
      </svg>
    </button>

    <div class="menu-title">
      <span class="title-line blue-glow">NEON</span>
      <span class="title-line purple-glow">BLOCK</span>
    </div>
    <p class="menu-subtitle">Premium Neon-Pastel Experience</p>

    <div class="menu-best-score glass-panel">
      <span class="label">Best Score</span>
      <span id="menu-best-score" class="value" style="color: var(--color-l); font-size: 1.3rem;">0</span>
    </div>

    <div class="menu-buttons">
      <button id="mode-normal" class="mode-btn neon-btn-cyan">
        <svg class="mode-icon">
          <use href="#icon-play"></use>
        </svg>
        <div class="mode-text">
          <span class="mode-title">Oyuna Başla</span>
          <span class="mode-desc">Klasik Tetris deneyimi</span>
        </div>
      </button>
      <button id="mode-hard" class="mode-btn neon-btn-red">
        <svg class="mode-icon">
          <use href="#icon-bolt"></use>
        </svg>
        <div class="mode-text">
          <span class="mode-title">Hard Mode</span>
          <span class="mode-desc">Yüksek hızlı oyun</span>
        </div>
      </button>
      <button id="mode-timed" class="mode-btn neon-btn-purple">
        <svg class="mode-icon">
          <use href="#icon-timer"></use>
        </svg>
        <div class="mode-text">
          <span class="mode-title">Zamanlı Oyun</span>
          <span class="mode-desc">2 dakikada en yüksek skor</span>
        </div>
      </button>
    </div>
  </div>

  <!-- ==================== SETTINGS PANEL ==================== -->
  <div id="settings-panel" class="menu-screen hidden">
    <div class="settings-header">
      <button id="settings-back" class="settings-back-btn">
        <svg>
          <use href="#icon-back"></use>
        </svg>
      </button>
      <h2 class="blue-glow">Ayarlar</h2>
    </div>
    <div class="settings-content">
      <div class="setting-row">
        <span class="setting-label">Ses Efektleri</span>
        <button id="settings-sfx" class="glass-panel audio-btn" title="Ses Efektleri">
          <svg style="width: 22px; height: 22px; stroke: white; fill: none;">
            <use href="#icon-sound-on"></use>
          </svg>
          <span class="audio-label">SFX</span>
        </button>
      </div>
      <div class="setting-row">
        <span class="setting-label">Müzik</span>
        <button id="settings-bgm" class="glass-panel audio-btn" title="Müzik">
          <svg style="width: 22px; height: 22px; stroke: white; fill: none;">
            <use href="#icon-music-on"></use>
          </svg>
          <span class="audio-label">BGM</span>
        </button>
      </div>
      <div class="setting-row">
        <span class="setting-label">En Yüksek Skor</span>
        <span id="settings-best" class="value" style="color: var(--color-l);">0</span>
      </div>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="game-screen" class="game-container hidden">
    <!-- Top Stats Bar -->
    <div class="top-stats-bar">
      <div class="glass-panel stat-item">
        <span class="label">Hold</span>
        <canvas id="hold-preview" width="60" height="60"></canvas>
      </div>
      <div class="glass-panel stat-item">
        <span class="label">Score</span>
        <span id="score-val" class="value" style="color: var(--color-i)">0</span>
      </div>
      <div class="glass-panel stat-item">
        <span class="label">Best</span>
        <span id="best-score-val" class="value" style="color: var(--color-l)">0</span>
      </div>
      <div class="glass-panel stat-item" id="timer-stat" style="display: none;">
        <span class="label">Süre</span>
        <span id="timer-val" class="value" style="color: var(--color-z)">2:00</span>
      </div>
      <div class="glass-panel stat-item">
        <span class="label">Next</span>
        <canvas id="next-preview" width="60" height="60"></canvas>
      </div>
      <div class="glass-panel stat-item">
        <span class="label">Level</span>
        <span id="level-val" class="value" style="color: var(--color-t)">1</span>
      </div>
      <button id="pause-toggle" class="glass-panel stat-item" style="cursor: pointer;">
        <svg style="width: 22px; height: 22px; stroke: white; fill: none;">
          <use href="#icon-pause"></use>
        </svg>
      </button>
    </div>

    <!-- Game Canvas Area -->
    <div class="canvas-wrapper">
      <canvas id="game-canvas"></canvas>

      <div id="pause-overlay" class="overlay">
        <h2 class="blue-glow">PAUSED</h2>
        <div class="audio-toggles" style="margin-bottom: 1rem;">
          <button id="sfx-toggle" class="glass-panel audio-btn" title="Ses Efektleri">
            <svg style="width: 22px; height: 22px; stroke: white; fill: none;">
              <use href="#icon-sound-on"></use>
            </svg>
            <span class="audio-label">SFX</span>
          </button>
          <button id="bgm-toggle" class="glass-panel audio-btn" title="Müzik">
            <svg style="width: 22px; height: 22px; stroke: white; fill: none;">
              <use href="#icon-music-on"></use>
            </svg>
            <span class="audio-label">BGM</span>
          </button>
        </div>
        <button id="resume-btn" class="neon-action-btn" style="font-size: 1rem;">Devam Et</button>
        <button id="quit-btn" class="neon-action-btn quit" style="font-size: 0.9rem; margin-top: 0.5rem;">Ana
          Menü</button>
      </div>

      <div id="game-over-overlay" class="overlay">
        <h2 style="color: var(--color-z)">GAME OVER</h2>
        <div class="label">Final Score</div>
        <div id="final-score" class="value" style="margin-bottom: 1.5rem;">0</div>
        <div class="label">Best Score</div>
        <div id="best-score" class="value" style="margin-bottom: 1.5rem; color: var(--color-l);">0</div>
        <button id="restart-btn" class="neon-action-btn" style="font-size: 1rem;">Tekrar Oyna</button>
        <button id="menu-btn" class="neon-action-btn quit" style="font-size: 0.9rem; margin-top: 0.5rem;">Ana
          Menü</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="btn-left" class="control-btn"><svg>
          <use href="#icon-left"></use>
        </svg></button>
      <button id="btn-down" class="control-btn"><svg>
          <use href="#icon-down"></use>
        </svg></button>
      <button id="btn-right" class="control-btn"><svg>
          <use href="#icon-right"></use>
        </svg></button>
      <button id="btn-hard-drop" class="control-btn"><svg>
          <use href="#icon-hard-drop"></use>
        </svg></button>
      <button id="btn-hold" class="control-btn"><span
          style="font-size: 10px; font-weight: bold; color: var(--color-l)">HOLD</span></button>
      <button id="btn-rotate" class="control-btn"><svg>
          <use href="#icon-rotate"></use>
        </svg></button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
